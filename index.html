<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Abai</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

    :root.day {
      --bg:#eeebe6; --card-bg:#faf9f7; --card-border:#dedad4;
      --text:#1a1a1a; --corner:rgba(0,0,0,.2); --grid:rgba(0,0,0,.03); --shadow:rgba(0,0,0,.1);
      --sns:#bbb; --sns-hbg:rgba(0,0,0,.05); --sns-hc:#333;
      --btn-bg:#1a1a1a; --btn-bd:#1a1a1a; --btn-c:#f5f5f5; --btn-hc:#fff;
    }
    :root.night {
      --bg:#0d0d0f; --card-bg:#111114; --card-border:#2a2a30;
      --text:#f0f0f0; --corner:rgba(200,255,0,.45); --grid:rgba(255,255,255,.02); --shadow:rgba(0,0,0,.6);
      --sns:#444; --sns-hbg:rgba(200,255,0,.08); --sns-hc:#c8ff00;
      --btn-bg:#f0f0f0; --btn-bd:#f0f0f0; --btn-c:#1a1a1a; --btn-hc:#000;
    }

    html, body {
      height:100%; background:var(--bg);
      display:flex; align-items:center; justify-content:center;
      font-family:'SF Mono','Fira Code','Consolas',monospace;
      min-height:100dvh; transition:background .5s;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none;
      background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);
      background-size:40px 40px;
    }

    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }

    .wrap { display:flex; flex-direction:column; align-items:center; gap:16px; animation:fadeUp .6s cubic-bezier(.22,1,.36,1) both; }

    .card {
      position:relative; width:min(680px,calc(100vw - 40px)); aspect-ratio:1.75/1;
      background:var(--card-bg); border:1px solid var(--card-border); border-radius:16px;
      display:flex; align-items:center; justify-content:center; padding:0 8%;
      box-shadow:0 40px 80px var(--shadow),inset 0 1px 0 rgba(255,255,255,.05);
      transition:background .5s,border-color .5s,box-shadow .5s;
    }
    .card::before,.card::after,.c-br,.c-bl {
      content:''; position:absolute; width:14px; height:14px; border-color:var(--corner); border-style:solid;
      transition:border-color .5s;
    }
    .card::before{top:12px;left:12px;border-width:1px 0 0 1px}
    .card::after {top:12px;right:12px;border-width:1px 1px 0 0}
    .c-br{bottom:12px;right:12px;border-width:0 1px 1px 0}
    .c-bl{bottom:12px;left:12px;border-width:0 0 1px 1px}

    .leaders { position:absolute; inset:0; width:100%; height:100%; pointer-events:none; overflow:visible; }

    .email-addr {
      font-family:'Ubuntu','SF Mono',sans-serif;
      font-size:clamp(2rem,6.5vw,3.8rem); font-weight:700; letter-spacing:.12em;
      color:var(--text); white-space:nowrap; user-select:none;
      position:relative; z-index:1; transition:color .5s;
    }
    #s-at { -webkit-text-stroke:0; }
    [data-b] { cursor:none; transition:opacity .2s; }
    [data-b]:hover { opacity:.8; }

    /* custom crosshair — difference blend always visible */
    #xhair {
      position:fixed; top:0; left:0; pointer-events:none; z-index:9999;
      opacity:0; transition:opacity .15s; mix-blend-mode:difference;
    }
    #xhair.on { opacity:1; }
    #xhair line { stroke:#fff; stroke-width:2; }
    #xhair circle { fill:#fff; }

    .sns {
      position:absolute; bottom:0; left:0; right:0; padding:0 8% 4%;
      display:flex; align-items:center; justify-content:center; gap:clamp(10px,2.5vw,22px);
    }
    .sns a {
      display:flex; align-items:center; justify-content:center;
      width:clamp(26px,4.2vw,32px); height:clamp(26px,4.2vw,32px);
      border-radius:7px; color:var(--sns); text-decoration:none;
      transition:color .2s,background .2s,transform .2s;
    }
    .sns a:hover { color:var(--sns-hc); background:var(--sns-hbg); transform:scale(1.15); }
    .sns svg { width:56%; height:56%; fill:currentColor; }

    .theme-btn {
      width:34px; height:34px; border-radius:50%;
      border:1px solid var(--btn-bd); background:var(--btn-bg); color:var(--btn-c);
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:color .3s,background .3s,border-color .3s,transform .2s; flex-shrink:0;
    }
    .theme-btn:hover { color:var(--btn-hc); transform:scale(1.1); }
    .theme-btn svg { width:14px; height:14px; fill:none; stroke:currentColor; stroke-width:2; stroke-linecap:round; }
    .night .i-moon{display:none} .night .i-sun{display:block}
    .day   .i-sun{display:none}  .day   .i-moon{display:block}

    @media(max-width:480px){ .card{aspect-ratio:auto;min-height:62vw;padding:0 6%} }
  </style>
</head>
<body>

<!-- custom crosshair -->
<svg id="xhair" width="32" height="32" viewBox="0 0 32 32" aria-hidden="true">
  <line x1="16" y1="2"  x2="16" y2="13"/>
  <line x1="16" y1="19" x2="16" y2="30"/>
  <line x1="2"  y1="16" x2="13" y2="16"/>
  <line x1="19" y1="16" x2="30" y2="16"/>
  <circle cx="16" cy="16" r="2" fill="#fff"/>
</svg>
<script>
  const NS = 'http://www.w3.org/2000/svg';
  const autoT = new Date().getHours() >= 6 && new Date().getHours() < 20 ? 'day' : 'night';
  let theme = localStorage.getItem('theme') || autoT;
  document.documentElement.classList.add(theme);

  document.getElementById('themeBtn').addEventListener('click', () => {
    theme = theme === 'day' ? 'night' : 'day';
    document.documentElement.classList.remove('day','night');
    document.documentElement.classList.add(theme);
    localStorage.setItem('theme', theme);
    draw();
  });

  // custom crosshair
  const xhair = document.getElementById('xhair');
  document.addEventListener('mousemove', e => {
    xhair.style.transform = `translate(${e.clientX - 16}px,${e.clientY - 16}px)`;
  });
  document.querySelectorAll('[data-b]').forEach(el => {
    el.addEventListener('mouseenter', () => xhair.classList.add('on'));
    el.addEventListener('mouseleave', () => xhair.classList.remove('on'));
  });

  function mk(tag, a) {
    const e = document.createElementNS(NS, tag);
    for (const [k,v] of Object.entries(a)) e.setAttribute(k,v);
    return e;
  }

  function brace(svg, x1, x2, baseY, dir, key, dimC, sw) {
    // dir: -1 = opens up (overbrace), +1 = opens down (underbrace)
    const aH = Math.max(8, (x2-x1) * 0.06);
    const pH = aH * 0.5;
    const cr = Math.min(aH * 0.6, 6);
    const mx = (x1+x2)/2;
    const tY = baseY + dir*aH, pY = tY + dir*pH;
    const d = `M${x1},${baseY}Q${x1},${tY} ${x1+cr},${tY}L${mx-cr},${tY}Q${mx},${tY} ${mx},${pY}Q${mx},${tY} ${mx+cr},${tY}L${x2-cr},${tY}Q${x2},${tY} ${x2},${baseY}`;
    const p = mk('path',{id:'br-'+key,d,fill:'none','stroke-linecap':'round','stroke-linejoin':'round','stroke-width':sw});
    p.style.cssText = `stroke:${dimC};transition:stroke .2s`;
    svg.appendChild(p);
    return { mx, labelY: pY + dir*4, aH, pH };
  }

  function draw() {
    const svg  = document.getElementById('leaders');
    const card = svg.closest('.card');
    const cR   = card.getBoundingClientRect();
    svg.setAttribute('viewBox',`0 0 ${cR.width} ${cR.height}`);
    svg.innerHTML = '';

    const isDay = theme === 'day';
    const dimC  = isDay ? '#ccc'    : '#34343e';
    const hiC   = isDay ? '#1a1a1a' : '#c8ff00';
    const ldim  = isDay ? '#bbb'    : '#44444e';
    const lhi   = isDay ? '#111'    : '#e0e0d8';
    const fs    = Math.max(8, cR.width * 0.014);
    const sw    = Math.max(0.8, cR.width * 0.0015);
    const sG    = Math.max(6, cR.height * 0.018);

    function b(id) {
      const r = document.getElementById(id).getBoundingClientRect();
      return { l:r.left-cR.left, r:r.right-cR.left,
               top:r.top-cR.top, bot:r.bottom-cR.top };
    }

    const hi=b('s-hi'), nm=b('s-name'), tl=b('s-tld');
    const emailTop = hi.top, emailBot = hi.bot;

    // above: NAME (closest), then SITE
    let cy = emailTop - sG;
    [
      {key:'name', x1:nm.l, x2:nm.r, lbl:'NAME'},
      {key:'site', x1:nm.l, x2:tl.r, lbl:'SITE'},
    ].forEach(({key,x1,x2,lbl}) => {
      const {mx, labelY} = brace(svg, x1, x2, cy, -1, key, dimC, sw);
      const t = mk('text',{id:'lb-'+key,x:mx,y:labelY-2,
        'font-size':fs,'font-family':'Space Grotesk,SF Mono,monospace',
        'letter-spacing':1.5,'text-anchor':'middle','dominant-baseline':'auto'});
      t.textContent = lbl;
      t.style.cssText = `fill:${ldim};transition:fill .2s`;
      svg.appendChild(t);
      cy = labelY - fs - sG;
    });

    // below: EMAIL
    const {mx:emx, labelY:ely} = brace(svg, hi.l, tl.r, emailBot + sG, +1, 'email', dimC, sw);
    const te = mk('text',{id:'lb-email',x:emx,y:ely+fs+1,
      'font-size':fs,'font-family':'Space Grotesk,SF Mono,monospace',
      'letter-spacing':1.5,'text-anchor':'middle','dominant-baseline':'auto'});
    te.textContent = 'EMAIL';
    te.style.cssText = `fill:${ldim};transition:fill .2s`;
    svg.appendChild(te);

    // hover
    [['s-hi','email'],['s-at','email'],['s-name','name'],['s-tld','site']].forEach(([sid,key]) => {
      const el = document.getElementById(sid);
      el.onmouseenter = () => hl(key,true);
      el.onmouseleave = () => hl(key,false);
    });

    function hl(key,on) {
      const br=document.getElementById('br-'+key), lb=document.getElementById('lb-'+key);
      if(br) br.style.stroke = on ? hiC : dimC;
      if(lb) { lb.style.fill = on ? lhi : ldim; lb.style.fontWeight = on ? '600' : '400'; }
    }
  }

  document.fonts.ready.then(draw);
  window.addEventListener('resize', draw);
</script>
</body>
